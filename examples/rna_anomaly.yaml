counts: /path/to/raw_counts.tsv
annotation: /path/to/gene_annotation_v29.tsv
output_dir: preprocess_out
bulkformer:
  variant: 37M
  device: cpu
anomaly:
  mask_schedule: deterministic
  K_target: 5
  mask_prob: 0.10
  # 100% gene coverage; mc_passes auto-computed (~50 for ~20k genes)
  output_dir: anomaly_out
calibration:
  output_dir: anomaly_calibrated
  count_space_method: none
